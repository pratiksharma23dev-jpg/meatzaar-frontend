<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../pictures/landing_img2.png">
    <title>Meatzaar - Contact Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>const PRODUCT_IMG_BASE = '../';</script>
    <script src="../shared/config.js"></script>
    <script src="../shared/auth.js" defer></script>
    <script src="../shared/products-data.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="logo">
                    <a href="../landing page/index.html"><h1>Meatzaar</h1></a>
                </div>
            </div>
            <div class="search-wrapper">
                <label class="search-box" for="searchInput">
                    <i class="fas fa-search"></i>
                    <input type="search" id="searchInput" placeholder="Search products" autocomplete="off">
                </label>
                <div class="search-dropdown" id="searchDropdown"></div>
            </div>
            <div class="auth-buttons">
                <button class="btn btn-login" id="loginBtn">Login</button>
                <button class="btn btn-signup" id="signupBtn">Sign Up</button>
            </div>
        </div>
    </header>

    <!-- Side Menu -->
    <aside class="side-menu" id="sideMenu">
        <button class="close-menu" id="closeMenu">
            <i class="fas fa-times"></i>
        </button>
        <nav class="side-nav">
            <a href="../landing page/index.html" class="side-link">Home</a>
            <a href="../what-we-sell/what-we-sell.html" class="side-link">What We Sell</a>
            <a href="contact.html" class="side-link">Contact</a>
            <a href="../products page/products.html" class="side-link">Categories</a>
            <a href="../cart/cart.html" class="side-link">Cart</a>
            <a href="../profile/profile.html" class="side-link">Profile</a>
        </nav>
    </aside>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Contact Section -->
    <section class="contact">
        <div class="contact-container">
            <h2>Contact Us</h2>
            <div class="contact-content">
                <div class="contact-info">
                    <div class="info-card">
                        <i class="fas fa-map-marker-alt"></i>
                        <h3>Address</h3>
                        <p>42, MG Road, Koramangala<br>Bangalore, Karnataka 560034</p>
                    </div>
                    <div class="info-card">
                        <i class="fas fa-phone"></i>
                        <h3>Phone</h3>
                        <p>+91 98765 43210</p>
                    </div>
                    <div class="info-card">
                        <i class="fas fa-envelope"></i>
                        <h3>Email</h3>
                        <p>info@meatzaar.com</p>
                    </div>
                </div>
                <form class="contact-form">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Meatzaar. All rights reserved.</p>
        <div class="social-links">
            <a href="#" class="social-icon"><i class="fab fa-facebook"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
        </div>
    </footer>
</body>
</html>
